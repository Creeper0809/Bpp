
name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      full_benchmarks:
        description: "Run separated benchmark job"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils coreutils

      - name: Build and test (Linux)
        env:
          BUILD_AND_TEST_PROFILE: fast
          TEST_SKIP_LLVM_BUILD: "1"
          TEST_JOBS: "4"
          TEST_PROGRESS: "1"
        run: |
          chmod +x build_and_test.sh test/run_tests.sh
          bash build_and_test.sh

      - name: Focused LLVM smoke tests (Linux)
        env:
          TEST_NAME_FILTER: "31_llvm_ll|32_llvm_ll|33_llvm_build|45_llvm_build|46_llvm_build|47_llvm_build"
          TEST_PROFILE: quick
          TEST_SKIP_LLVM_BUILD: "0"
          TEST_JOBS: "4"
          TEST_QUIET: "1"
          TEST_PROGRESS: "1"
          STRESS_RUNS: "0"
          STABILITY_RUNS: "0"
        run: |
          bash test/run_tests.sh bin/stage1

      - name: Diagnostics + manifest regression (Linux)
        run: |
          chmod +x test/run_regression.sh
          bash test/run_regression.sh

      - name: CMake install + bpp CLI smoke (Linux)
        run: |
          cmake -S . -B build-linux
          cmake --build build-linux --target toolchain-check
          cmake --install build-linux --prefix "$PWD/.local"
          ./.local/bin/bpp test/source/01_generics.bpp

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure toolchain with CMake
        run: |
          cmake -S . -B build-win -DBPP_BOOTSTRAP_NASM=ON

      - name: Export resolved toolchain paths
        shell: pwsh
        run: |
          Get-Content build-win/bpp_toolchain.env | ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Toolchain check + Windows executable smoke test
        run: |
          cmake --build build-win --target toolchain-check windows-smoke

      - name: Toolchain-only sanity via PowerShell runner
        shell: pwsh
        run: |
          ./build_and_test.ps1 -ToolchainOnly -NasmPath "$env:BPP_NASM_EXECUTABLE" -LinkerPath "$env:BPP_LINKER_EXECUTABLE"

      - name: Optional full Windows compiler test (requires stage compiler exe)
        shell: pwsh
        run: |
          $compilerExe = Get-ChildItem "./bin" -Filter "*_stage1.exe" -File -ErrorAction SilentlyContinue |
            Sort-Object Name | Select-Object -Last 1
          if ($compilerExe) {
            ./build_and_test.ps1 -CompilerPath $compilerExe.FullName -NasmPath "$env:BPP_NASM_EXECUTABLE" -LinkerPath "$env:BPP_LINKER_EXECUTABLE"
          } else {
            Write-Warning "Skipping full Windows compiler tests: no bin/*_stage1.exe found."
          }

  performance:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_benchmarks }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm binutils coreutils clang

      - name: Build fast stage compiler
        env:
          BUILD_AND_TEST_PROFILE: fast
          TEST_SKIP_LLVM_BUILD: "1"
          TEST_JOBS: "4"
          TEST_PROGRESS: "1"
        run: |
          chmod +x build_and_test.sh test/run_tests.sh
          bash build_and_test.sh

      - name: Run microbenchmarks
        env:
          COMPILER: ${{ github.workspace }}/bin/stage1
          RUNS: "5"
          OUT_DIR: ${{ github.workspace }}/build/microbench-ci
        run: |
          chmod +x bench/run_microbench.sh bench/run_tagged_pointer_fastpaths.sh
          bash bench/run_microbench.sh

      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        with:
          name: microbench-reports
          path: |
            build/microbench-ci/bench_report.tsv
            build/microbench-ci/optimization_report.tsv
            build/microbench-ci/comparison_report.tsv
            build/microbench-ci/optimization_thresholds.tsv
